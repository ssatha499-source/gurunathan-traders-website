{% extends 'admin/base.html' %}
{% block title %}{% if product %}Edit{% else %}Add{% endif %} Product{% endblock %}
{% block content %}
<div class="admin-login-card wide">
  <h2>{% if product %}Edit{% else %}Add{% endif %} Product</h2>
  <form method="post" enctype="multipart/form-data" class="contact-form">
    <label>Name</label>
    <input type="text" name="name" value="{{ product.name if product else '' }}" required />

    <label>Description</label>
    <textarea name="description" rows="4" required>{{ product.description if product else '' }}</textarea>

    <label>Price (INR)</label>
    <input type="number" name="price" min="1" step="0.01" value="{{ product.price if product else '' }}" required />

    <label>Category</label>
    <select name="category_id" required>
      <option value="">Select category</option>
      {% for category in categories %}
      <option value="{{ category.id }}" {% if product and product.category_id == category.id %}selected{% endif %}>{{ category.name }}</option>
      {% endfor %}
    </select>

    <label>Product Image {% if not product %}(optional){% endif %}</label>
    <input type="file" name="image" accept=".png,.jpg,.jpeg,.webp,.gif" />

    {% if product and product.image_url %}
    <img src="{{ product.image_url }}" alt="Current image" class="preview" />
    {% endif %}

    <button class="btn btn-primary" type="submit">Save Product</button>
  </form>
</div>
{% endblock %}
